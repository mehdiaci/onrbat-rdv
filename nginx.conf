# Nginx reverse proxy pour ONRBAT
# Remplacer VOTRE_DOMAINE par votre domaine (ou laisser _ pour accès par IP)
# Certbot ajoutera automatiquement le bloc SSL lors du déploiement.

server {
    listen 80;
    server_name VOTRE_DOMAINE;

    # Taille max des uploads (import JSON)
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/onrbat_access.log;
    error_log  /var/log/nginx/onrbat_error.log;

    # Tout le trafic est transmis à l'application Node/Express sur le port 3000.
    # Express gère à la fois l'API (/api/*) et les routes React (SPA fallback → index.html).
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;

        # SPA React : si un asset statique n'est pas trouvé, Express renvoie index.html
        # (géré côté Node via app.get('*', res.sendFile('index.html')))
    }
}
