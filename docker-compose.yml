services:
  onrbat:
    build: .
    container_name: onrbat-app
    ports:
      - "3000:3000"
    volumes:
      - onrbat-data:/data
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  onrbat-data:
    driver: local
